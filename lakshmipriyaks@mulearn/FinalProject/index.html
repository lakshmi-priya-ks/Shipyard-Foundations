<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My First Scalable Web App</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #000;
    color: #fff;
    font-family: "Courier New", monospace;
}

/* Center layout */
.wrapper {
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Terminal box */
.terminal {
    width: 480px;
    padding: 25px;
    border: 2px solid white;
    box-shadow: 0 0 15px white;
}

/* Text lines */
.line {
    margin: 10px 0;
    font-size: 1.1em;
}

/* Title */
.title {
    font-size: 1.6em;
    margin-bottom: 15px;
}

/* Divider */
.divider {
    border-top: 1px dashed white;
    margin: 15px 0;
}

/* Blinking cursor */
.cursor {
    display: inline-block;
    width: 10px;
    background: white;
    animation: blink 1s infinite;
}

@keyframes blink {
    0% {opacity: 1;}
    50% {opacity: 0;}
    100% {opacity: 1;}
}
</style>

</head>

<body>

<div class="wrapper">
    <div class="terminal">

        <div class="line title">> MY FIRST SCALABLE WEB APP</div>

        <div class="divider"></div>

        <div class="line">> Packaging app with Docker</div>
        <div class="line">> Deploying using Kubernetes</div>
        <div class="line">> Scaling across multiple instances</div>
        <div class="line">> System recovery verified</div>

        <div class="divider"></div>

        <div class="line">> Project executed successfully<span class="cursor"></span></div>

    </div>
</div>

</body>
</html>
