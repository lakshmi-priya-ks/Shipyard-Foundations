apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-web-deployment

spec:
  replicas: 3

  selector:
    matchLabels:
      app: my-web

  template:
    metadata:
      labels:
        app: my-web

    spec:
      containers:
      - name: my-web-container
        image: my-web-app

        env:
        - name: STUDENT_NAME
          value: "Your_Name"

        ports:
        - containerPort: 80
